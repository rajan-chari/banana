<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pty-win debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Mono', 'Consolas', monospace; background: #111; color: #ccc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 16px; padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #333; }
  header h1 { font-size: 14px; color: #d4882a; letter-spacing: 1px; }
  .log-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 11px; }
  .log-controls select, .log-controls button { font-family: inherit; font-size: 11px; background: #222; color: #ccc; border: 1px solid #444; padding: 2px 6px; cursor: pointer; }
  .log-controls button:hover { background: #333; }
  .main { flex: 1; display: flex; min-height: 0; }
  .sidebar { width: 200px; border-right: 1px solid #333; overflow-y: auto; padding: 8px; }
  .sidebar h2 { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .session-btn { display: block; width: 100%; text-align: left; padding: 6px 8px; font-family: inherit; font-size: 12px; background: none; border: none; color: #aaa; cursor: pointer; border-left: 2px solid transparent; }
  .session-btn:hover { background: #1a1a1a; }
  .session-btn.active { color: #fff; border-left-color: #d4882a; background: #1a1a1a; }
  .session-btn .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
  .dot.idle { background: #4ec9b0; }
  .dot.busy { background: #d4882a; animation: pulse 1s infinite; }
  .dot.starting { background: #569cd6; }
  .dot.dead { background: #555; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .detail { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .detail-top { flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 0; }
  .detail-top h3 { font-size: 11px; color: #d4882a; text-transform: uppercase; letter-spacing: 1px; margin: 12px 0 6px; }
  .detail-top h3:first-child { margin-top: 0; }
  .actions { display: flex; gap: 8px; margin: 8px 0; }
  .actions button, .actions select { font-family: inherit; font-size: 11px; background: #222; color: #ccc; border: 1px solid #444; padding: 4px 10px; cursor: pointer; }
  .actions button:hover { background: #333; }
  .kv { font-size: 11px; line-height: 1.8; }
  .kv .k { color: #666; }
  .kv .v { color: #ccc; }
  .kv .v.idle { color: #4ec9b0; }
  .kv .v.busy { color: #d4882a; }
  .screen-dump { background: #0a0a0a; padding: 8px; font-size: 11px; line-height: 1.4; overflow-x: auto; max-height: 300px; white-space: pre; color: #aaa; border: 1px solid #222; }
  .history-list { max-height: 250px; overflow-y: auto; font-size: 10px; }
  .history-item { padding: 2px 0; border-bottom: 1px solid #1a1a1a; display: flex; gap: 8px; }
  .history-item .time { color: #555; min-width: 70px; }
  .history-item .type { color: #569cd6; min-width: 90px; }
  .history-item .action { min-width: 80px; }
  .history-item .action.idle { color: #4ec9b0; }
  .history-item .action.none { color: #555; }
  .history-item .reason { color: #777; flex: 1; }
  .log-panel { height: 200px; border-top: 1px solid #333; display: flex; flex-direction: column; }
  .log-panel h2 { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 6px 16px; background: #1a1a1a; }
  .log-body { flex: 1; overflow-y: auto; padding: 4px 16px; font-size: 10px; line-height: 1.6; }
  .log-line { color: #777; white-space: pre-wrap; word-break: break-all; }
  .log-line.verbose { color: #569cd6; }
  .log-line.trace { color: #555; }
  .empty { color: #444; font-style: italic; padding: 16px; }
  .detection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
</style>
</head>
<body>
<header>
  <h1>PTY-WIN DEBUG</h1>
  <div class="log-controls">
    <label>Level: <select id="log-level"><option>normal</option><option>verbose</option><option>trace</option></select></label>
    <button id="log-toggle">Log: OFF</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <h2>Sessions</h2>
    <div id="session-list"></div>
  </div>
  <div class="detail">
    <div class="detail-top" id="detail"></div>
    <div class="log-panel">
      <h2>Log Stream</h2>
      <div class="log-body" id="log-body"></div>
    </div>
  </div>
</div>
<script>
let selectedSession = null;
let logSSE = null;

// --- Session list ---
async function refreshSessions() {
  try {
    const res = await fetch("/api/debug/sessions");
    const data = await res.json();
    const list = document.getElementById("session-list");
    list.innerHTML = "";
    for (const [name, state] of Object.entries(data.sessions)) {
      const btn = document.createElement("button");
      btn.className = `session-btn ${name === selectedSession ? "active" : ""}`;
      btn.innerHTML = `<span class="dot ${state.status}"></span>${name}`;
      btn.onclick = () => { selectedSession = name; refreshSessions(); refreshDetail(); };
      list.appendChild(btn);
    }
    if (!selectedSession && data.sessionCount > 0) {
      selectedSession = Object.keys(data.sessions)[0];
      refreshDetail();
    }
  } catch { document.getElementById("session-list").innerHTML = '<div class="empty">connection failed</div>'; }
}

// --- Detail panel ---
async function refreshDetail() {
  const el = document.getElementById("detail");
  if (!selectedSession) { el.innerHTML = '<div class="empty">select a session</div>'; return; }
  try {
    const [stateRes, detRes, injRes, detHistRes] = await Promise.all([
      fetch(`/api/debug/sessions/${selectedSession}`),
      fetch(`/api/debug/sessions/${selectedSession}/detection`),
      fetch(`/api/debug/sessions/${selectedSession}/injections`),
      fetch(`/api/debug/sessions/${selectedSession}/detection/history`),
    ]);
    const state = await stateRes.json();
    const det = await detRes.json();
    const inj = await injRes.json();
    const detHist = await detHistRes.json();

    let html = `<h3>Session: ${selectedSession}</h3>`;
    html += `<div class="actions">
      <button onclick="doScreenDump()">Screen Dump</button>
      <select id="inject-type"><option value="emcom">emcom</option><option value="checkpoint-light">checkpoint-light</option><option value="checkpoint-full">checkpoint-full</option><option value="startup">startup</option><option value="resume">resume</option></select>
      <button onclick="doInject()">Inject</button>
      <button onclick="showPrompts()">View Prompts</button>
    </div>`;

    // State overview
    html += `<div class="kv">`;
    html += kv("Status", state.status, state.status);
    html += kv("Quiet", `${(state.quietMs / 1000).toFixed(1)}s`);
    html += kv("Cost", `$${(state.costUsd || 0).toFixed(2)}`);
    html += kv("Pending Messages", state.pendingMessages);
    html += kv("Unread", state.unreadCount);
    html += kv("Checkpoint", state.pendingCheckpoint || "none");
    html += kv("Checkpoint In-Flight", state.checkpointInFlight);
    html += kv("Last Checkpoint", state.lastCheckpointAgoMs ? `${Math.round(state.lastCheckpointAgoMs / 60000)}m ago` : "never");
    html += `</div>`;

    // Detection state
    html += `<h3>Busy Detection</h3><div class="detection-grid kv">`;
    html += kv("Prompt Type", det.screen?.promptType || "?");
    html += kv("Cursor Y", det.screen?.cursorY);
    html += kv("Heuristic Active", det.heuristic?.timerActive);
    html += kv("ML In-Flight", det.ml?.queryInFlight);
    html += kv("ML Last Label", det.ml?.lastSavedLabel || "none");
    html += kv("Busy Elapsed", det.busyTimeout?.elapsedMs ? `${Math.round(det.busyTimeout.elapsedMs / 1000)}s` : "n/a");
    html += kv("Timeout Saved", det.busyTimeout?.timeoutSampleSaved);
    html += kv("Last Hook Stop", det.hooks?.lastStopTime ? ago(det.hooks.lastStopTime) : "never");
    html += kv("Last Notify", det.hooks?.lastNotifyType || "none");
    html += `</div>`;

    // Screen content (last 4 lines)
    if (det.screen?.contentLines?.length) {
      html += `<h3>Screen (last ${det.screen.contentLines.length} lines)</h3>`;
      html += `<div class="screen-dump">${esc(det.screen.contentLines.join("\\n"))}</div>`;
    }

    // Detection history
    html += `<h3>Detection History (${detHist.count} ticks)</h3>`;
    html += `<div class="history-list">`;
    for (const t of [...detHist.ticks].reverse().slice(0, 50)) {
      const ts = new Date(t.time).toLocaleTimeString("en-US", { hour12: false });
      html += `<div class="history-item"><span class="time">${ts}</span><span class="type">${t.promptType}</span><span class="action ${t.action}">${t.action}</span><span class="reason">${esc(t.reason)}</span></div>`;
    }
    html += `</div>`;

    // Injection history
    html += `<h3>Injection History (${inj.count})</h3>`;
    html += `<div class="history-list">`;
    for (const i of [...inj.injections].reverse().slice(0, 20)) {
      const ts = new Date(i.time).toLocaleTimeString("en-US", { hour12: false });
      const short = i.prompt.length > 60 ? i.prompt.slice(0, 60) + "..." : i.prompt;
      html += `<div class="history-item"><span class="time">${ts}</span><span class="type">${i.type}</span><span class="reason" title="${esc(i.prompt)}">${esc(short)}</span></div>`;
    }
    html += `</div>`;

    // Screen dump container (populated on click)
    html += `<div id="screen-dump-area"></div>`;
    html += `<div id="prompts-area"></div>`;

    el.innerHTML = html;
  } catch (e) { el.innerHTML = `<div class="empty">error loading: ${e}</div>`; }
}

function kv(key, val, cls) {
  return `<span class="k">${key}:</span> <span class="v ${cls || ""}">${val}</span><br>`;
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function ago(ts) { const s = Math.round((Date.now() - ts) / 1000); return s < 60 ? `${s}s ago` : `${Math.round(s/60)}m ago`; }

async function doScreenDump() {
  if (!selectedSession) return;
  const res = await fetch(`/api/debug/sessions/${selectedSession}/screen?lines=40`);
  const data = await res.json();
  const area = document.getElementById("screen-dump-area");
  if (area) area.innerHTML = `<h3>Full Screen Dump (${data.contentLines.length} lines)</h3><div class="screen-dump">${esc(data.contentLines.join("\\n"))}</div>`;
}

async function doInject() {
  if (!selectedSession) return;
  const type = document.getElementById("inject-type")?.value;
  await fetch(`/api/debug/sessions/${selectedSession}/inject`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type }),
  });
  setTimeout(refreshDetail, 500);
}

async function showPrompts() {
  if (!selectedSession) return;
  const res = await fetch(`/api/debug/sessions/${selectedSession}/prompts`);
  const data = await res.json();
  const area = document.getElementById("prompts-area");
  if (!area) return;
  let html = `<h3>Prompt Templates (submit: ${data.submitChar} = ${data.submitCharCode})</h3><div class="kv">`;
  for (const [k, v] of Object.entries(data)) {
    if (k === "session" || k === "submitChar" || k === "submitCharCode") continue;
    html += `<strong>${k}:</strong><br><div class="screen-dump">${esc(JSON.stringify(v))}</div><br>`;
  }
  html += `</div>`;
  area.innerHTML = html;
}

// --- Log stream ---
function connectLogStream() {
  if (logSSE) logSSE.close();
  logSSE = new EventSource("/api/debug/log-stream");
  logSSE.onmessage = (e) => {
    const body = document.getElementById("log-body");
    const line = document.createElement("div");
    line.className = "log-line";
    const text = JSON.parse(e.data);
    if (text.includes("[verbose")) line.classList.add("verbose");
    if (text.includes("[trace")) line.classList.add("trace");
    line.textContent = text;
    body.appendChild(line);
    // Auto-scroll if near bottom
    if (body.scrollHeight - body.scrollTop - body.clientHeight < 50) {
      body.scrollTop = body.scrollHeight;
    }
    // Cap at 500 lines
    while (body.children.length > 500) body.removeChild(body.firstChild);
  };
}

// --- Log controls ---
document.getElementById("log-level").onchange = async (e) => {
  await fetch("/api/debug/log", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ level: e.target.value }),
  });
};
document.getElementById("log-toggle").onclick = async () => {
  const btn = document.getElementById("log-toggle");
  const isOn = btn.textContent.includes("ON");
  await fetch("/api/debug/log", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ enabled: !isOn }),
  });
  btn.textContent = isOn ? "Log: OFF" : "Log: ON";
};

// --- Init ---
refreshSessions();
setInterval(refreshSessions, 5000);
setInterval(() => { if (selectedSession) refreshDetail(); }, 3000);
connectLogStream();
</script>
</body>
</html>
